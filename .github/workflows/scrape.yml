name: scrape

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: parser/requirements.txt

      - run: pip install -r parser/requirements.txt

      - run: python parser/build_data.py
        working-directory: ${{ github.workspace }}

      - run: |
          git config user.name 'shifer-bot'
          git config user.email 'bot@shifer.app'
          git add docs/data.json
          git diff --cached --quiet || git commit -m 'update data.json'
          git push
